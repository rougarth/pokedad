services:
  api:
    env_file:
      - path: .env.ngrok
        required: false
      - path: apps/api/.env.ngrok
        required: false

  cloudflared:
    profiles: ["cloudflare"]

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: ["http", "--domain=${NGROK_DOMAIN:-domain-required.ngrok-free.dev}", "http://web:80"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      web:
        condition: service_healthy

