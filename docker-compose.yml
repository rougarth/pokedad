services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokedad
      POSTGRES_PASSWORD: pokedad
      POSTGRES_DB: pokedad
    ports:
      - "55433:5432"
    volumes:
      - pokedad_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - pokedad_redis:/data

volumes:
  pokedad_postgres:
  pokedad_redis:
